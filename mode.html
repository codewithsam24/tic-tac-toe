<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe - Select Mode</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="mode-container">
        <h1>Select Game Mode</h1>
        <div class="mode-options">
            <button id="vs-player-btn" class="mode-btn">
                <h2>Vs Player</h2>
                <p>Play against another player on the same device</p>
            </button>
            <button id="vs-ai-btn" class="mode-btn">
                <h2>Vs AI</h2>
                <p>Challenge the computer with different difficulty levels</p>
            </button>
            <button id="online-btn" class="mode-btn">
                <h2>Online Multiplayer</h2>
                <p>Play against players online with a room code</p>
            </button>
        </div>
        <button id="back-btn" class="back-btn">Back</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
