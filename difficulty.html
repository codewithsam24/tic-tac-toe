<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe - Select Difficulty</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="difficulty-container">
        <h1>Select AI Difficulty</h1>
        <div class="difficulty-options">
            <button id="easy-btn" class="difficulty-btn">
                <h2>Easy</h2>
                <p>Random moves - perfect for beginners</p>
            </button>
            <button id="medium-btn" class="difficulty-btn">
                <h2>Medium</h2>
                <p>Blocks your moves - a fair challenge</p>
            </button>
            <button id="hard-btn" class="difficulty-btn">
                <h2>Hard</h2>
                <p>Smarter AI - try to beat it!</p>
            </button>
        </div>
        <button id="back-btn" class="back-btn">Back</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
