<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe - Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <header class="game-header">
            <div class="mode-display">Mode: <span id="mode-text"></span></div>
            <div class="scores">
                <span id="score-x">X: 0</span> - <span id="score-o">O: 0</span>
            </div>
            <div class="turn-indicator">Turn: <span id="current-turn">X</span></div>
        </header>
        <div class="board" id="board">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>
        <div class="message" id="message"></div>
        <div class="controls">
            <button id="restart-btn">Restart Game</button>
            <button id="reset-btn">Reset Scores</button>
            <button id="back-btn">Back to Menu</button>
        </div>
    </div>
    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
